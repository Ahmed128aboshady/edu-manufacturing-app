name: edu_manufacturing_app
description: "edu-Manufacturing-General - Flutter Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP Client
  dio: ^5.4.0

  # State Management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.2.0

  # Image caching
  cached_network_image: ^3.3.1

  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI
  shimmer: ^3.0.0
  badges: ^3.1.1
  google_fonts: ^6.1.0
  lottie: ^3.0.0
  font_awesome_flutter: ^10.7.0
  flutter_staggered_animations: ^1.1.1
  smooth_page_indicator: ^1.1.0
  another_flushbar: ^1.12.30

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.4
  flutter_svg: ^2.0.9
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # Fonts are loaded via google_fonts package
